<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takumi Browser</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #049CD8; color: #000; font-family: "Pixelify Sans", system-ui, sans-serif; padding: 24px; }
    h1 { font-family: "Press Start 2P", monospace; font-size: 12px; color: #FBD000; text-shadow: 2px 2px 0 #000; margin: 0 0 16px; }
    .card { max-width: 520px; margin: 0 auto; background: #FFCC99; border: 4px solid #000; box-shadow: 6px 6px 0 #C84C0C; padding: 20px; border-radius: 4px; }
    p { font-family: "DotGothic16", sans-serif; margin: 0 0 10px; }
    ul { margin: 8px 0 0; padding-left: 20px; }
    a { color: #E52521; font-weight: 700; }
    a:hover { color: #049CD8; }
    .hint { font-size: 13px; color: #C84C0C; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Takumi Browser</h1>
    <p>Type a URL in the bar and press <strong>Open</strong> — the page loads in a <strong>normal browser tab</strong> (full site, same as Chrome/Edge).</p>
    <p><strong>Quick links</strong> (new tab):</p>
    <ul>
      <li><a href="https://example.com/" target="_blank" rel="noopener noreferrer">example.com</a></li>
      <li><a href="https://www.w3schools.com/" target="_blank" rel="noopener noreferrer">W3Schools</a></li>
      <li><a href="https://developer.mozilla.org/" target="_blank" rel="noopener noreferrer">MDN</a></li>
    </ul>
    <p class="hint">Allow pop-ups for this site if the new tab is blocked.</p>
  </div>
</body>
</html>
