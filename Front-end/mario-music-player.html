<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap');
    </style>
    <link rel="stylesheet" href="mario-theme.css">
    <link rel="stylesheet" href="mario-music-player.css">
</head>
<body class="mario-theme">
    <div class="mario-app-container">
        <!-- Left Panel - Player Controls -->
        <div class="mario-left-panel">
            <!-- Folder Picker -->
            <div class="folder-section">
                <button id="folderPickerBtn" class="mario-btn mario-btn-primary">
                    Pick folder
                </button>
                <div id="folderStatus" class="folder-status">
                    <span id="folderName">No folder selected</span>
                </div>
                <div id="loadingIndicator" class="loading-indicator" style="display: none;">
                    <div class="spinner" aria-hidden="true"></div>
                    <span id="loadingText">Scanning...</span>
                </div>
            </div>

            <!-- Album Art / Visualization -->
            <div class="album-display">
                <img
                    class="mario-char-img"
                    src="Assets/images/Mushroom%20(1).png"
                    width="120"
                    height="120"
                    alt="Super Mushroom"
                >
                <div id="visualization" class="viz-bars">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>

            <!-- Song Info -->
            <div class="song-info-box">
                <div id="currentTitle" class="song-title">No Song Playing</div>
                <div id="currentArtist" class="song-artist">Select a song</div>
            </div>

            <!-- Dark media dock: top = transport + time + volume; bottom = full-width seek -->
            <div class="player-control-dock" aria-label="Playback controls">
                <div class="player-control-top">
                    <div class="player-control-top-spacer" aria-hidden="true"></div>
                    <div class="player-transport">
                        <button type="button" id="prevBtn" class="transport-btn" aria-label="Previous track">
                            <svg class="transport-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M4 5h3v14H4V5zm6 0v14l10-7-10-7z"/></svg>
                        </button>
                        <button type="button" id="playBtn" class="transport-btn transport-btn-play" aria-label="Play or pause">
                            <svg class="transport-icon-play" id="playIconSvg" viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.25"/>
                                <path fill="currentColor" d="M10 8l6 4-6 4V8z"/>
                            </svg>
                            <svg class="transport-icon-pause is-hidden" id="pauseIconSvg" viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.25"/>
                                <path fill="currentColor" d="M9 8h2v8H9V8zm4 0h2v8h-2V8z"/>
                            </svg>
                        </button>
                        <button type="button" id="nextBtn" class="transport-btn" aria-label="Next track">
                            <svg class="transport-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M5 5l12 7-12 7V5zm13 0h3v14h-3V5z"/></svg>
                        </button>
                    </div>
                    <div class="player-control-right">
                        <span id="timeRangeDisplay" class="player-time-range">00:00 / 00:00</span>
                        <div class="volume-inline">
                            <button type="button" class="vol-icon-btn" id="volumeBtn" aria-label="Volume">
                                <svg class="vol-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4.03v8.05a4.5 4.5 0 002.5-4.02zM14 3.23v2.06a7 7 0 010 13.42v2.06A9 9 0 0014 3.23z"/>
                                </svg>
                            </button>
                            <div class="volume-slider-wrap">
                                <input type="range" id="volumeSlider" class="volume-bar" min="0" max="100" value="70" aria-label="Volume level">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="player-seek-row" id="playerSeekRow">
                    <input type="range" id="seekBar" class="seek-bar seek-bar-main" min="0" max="100" value="0" step="0.05" aria-label="Seek position">
                </div>
            </div>
        </div>

        <!-- Right Panel - Playlist -->
        <div class="mario-right-panel">
            <div class="library-header">
                <h2>Library</h2>
                <input type="text" id="searchBox" class="search-box" placeholder="Search…">
            </div>
            <div id="playlistItems" class="playlist">
                <div class="empty-state">Pick a folder to start</div>
            </div>
            <div class="playlist-footer">
                <span id="songCount">0 songs</span>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script src="mario-music-player.js"></script>
</body>
</html>
